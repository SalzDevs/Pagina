<!DOCTYPE html>
<html>
  <body>
    <h1>Blockquote Demo</h1>
    <p>Body text sits at the left edge.</p>
    <blockquote>
      <p>This quotation is indented by default.</p>
    </blockquote>
    <blockquote>
      <p>Outer quote.</p>
      <blockquote>
        <p>Nested quote indents further.</p>
      </blockquote>
    </blockquote>
  </body>
</html>
