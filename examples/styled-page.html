<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        color: #cccccc;
        background: #111111;
      }

      h1 {
        color: #ffd700;
      }

      p.intro {
        color: #8be9fd;
      }

      #highlight {
        color: #50fa7b;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Styled Page</h1>
    <p class="intro">This paragraph uses a class selector from CSS.</p>
    <p id="highlight">This paragraph uses an id selector.</p>
    <p>Default body colors apply here.</p>
  </body>
</html>
