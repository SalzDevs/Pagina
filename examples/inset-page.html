<!DOCTYPE html>
<html>
  <body>
    <h1>Horizontal Inset Demo</h1>
    <style>
      blockquote {
        margin-left: 4ch;
        padding-left: 2ch;
        background-color: #333;
      }
      .narrow {
        margin-left: 2ch;
        margin-right: 2ch;
      }
    </style>
    <blockquote>Quoted text stays indented from the left edge.</blockquote>
    <p class="narrow">This paragraph wraps inside horizontal margins.</p>
  </body>
</html>
