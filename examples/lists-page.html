<!DOCTYPE html>
<html>
  <body>
    <h1>Lists Demo</h1>
    <p>Unordered list:</p>
    <ul>
      <li>First item</li>
      <li>Second item</li>
      <li>Third item</li>
    </ul>
    <p>Ordered list:</p>
    <ol>
      <li>Step one</li>
      <li>Step two</li>
      <li>Step three</li>
    </ol>
    <p>Nested list:</p>
    <ul>
      <li>Outer one</li>
      <li>
        Outer two
        <ul>
          <li>Inner A</li>
          <li>Inner B</li>
        </ul>
      </li>
      <li>Outer three</li>
    </ul>
  </body>
</html>
