<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Images Demo</title>
    <style>
      img.block {
        display: block;
      }
    </style>
  </head>
  <body>
    <h1>Image placeholders</h1>
    <p>
      See the <img src="chart.png" alt="sales chart" /> for quarterly results.
    </p>
    <p>Decorative icon: <img src="icon.png" /></p>
    <img class="block" src="hero.jpg" alt="hero banner" />
  </body>
</html>
